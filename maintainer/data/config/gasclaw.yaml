# Gasclaw Maintainer Configuration
# Editable from host — changes take effect on next maintenance cycle
# Secrets (API keys, tokens) stay in .env / env vars only

maintenance:
  loop_interval: 300        # seconds between Claude Code maintenance cycles
  max_pr_size: 200          # max lines changed per PR
  auto_merge: true          # auto-merge PRs when tests pass
  repo: "gastown-publish/gasclaw"
  working_dir: "/workspace/gasclaw"
  branch_prefixes:
    - "fix/"
    - "feat/"
    - "test/"
    - "docs/"
    - "refactor/"

claude:
  kimi_base_url: "https://api.kimi.com/coding/"
  dangerously_skip_permissions: true

openclaw:
  gateway_port: 18789

telegram:
  # User IDs allowed to DM the bot
  users:
    - "2045995148"          # nic (owner)
  # User IDs allowed to interact with the bot in groups
  # (the bot must be added to the group separately)
  group_users:
    - "2045995148"          # nic (owner)
  # Group chat IDs for sending notifications (startup, cycle reports)
  notify_groups:
    - "-1003759869133"      # gasclaw group (supergroup)
  # Forum topic thread IDs for routing notifications
  # (find thread IDs by creating topics in the group)
  topics:
    group_id: "-1003759869133"
    pull_request: 44         # PR created/merged/failed
    issue: 52                # issue opened/closed/fixed
    discussion: 60           # general updates, startup, cycle reports
    gastown: 114             # gastown status updates (every 15 min)
  status_interval: 900       # seconds between status updates (15 min)

logging:
  level: "INFO"
  log_dir: "/workspace/logs"
