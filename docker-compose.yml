services:
  gasclaw:
    build:
      context: .
      # Multi-platform support: linux/amd64, linux/arm64 (Apple Silicon)
      platforms:
        - linux/amd64
        - linux/arm64
    container_name: gasclaw
    ports:
      - "18789:18789"
    volumes:
      - ./project:/project
    env_file:
      - .env
    restart: unless-stopped
