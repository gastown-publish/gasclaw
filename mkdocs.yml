site_name: Gasclaw
site_description: Single-container deployment combining Gastown + OpenClaw + KimiGas
site_url: https://gastown-publish.github.io/gasclaw/
repo_url: https://github.com/gastown-publish/gasclaw
repo_name: gastown-publish/gasclaw
theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.path
    - search.suggest
    - search.highlight
    - content.code.copy
plugins:
  - search
nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Configuration: getting-started/configuration.md
    - Quick Start: getting-started/quickstart.md
  - Architecture: architecture.md
  - API Reference:
    - Bootstrap: api/bootstrap.md
    - Config: api/config.md
    - Health: api/health.md
    - Key Pool: api/key-pool.md
  - Troubleshooting: troubleshooting.md
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
